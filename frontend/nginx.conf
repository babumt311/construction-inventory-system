# 1. PERMISSION FIX: Define this at the VERY TOP (Global Context)
# This prevents the "Permission denied" alert on startup
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 2. LOGGING: Access logs to stdout
    access_log /dev/stdout;

    # Temp paths for non-root user
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile on;
    keepalive_timeout 65;
    gzip on;

    # 3. SERVER BLOCK
    server {
        listen 8080;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Health check (simple return to keep logs clean)
        location /health {
            access_log off;
            return 200 'healthy';
        }

        # === THE CRITICAL FIX FOR "HOST NOT FOUND" ===
        location /api/ {
            # A. Define Docker's internal DNS resolver
            resolver 127.0.0.11 valid=30s;
            
            # B. Use a VARIABLE for the upstream URL
            # This tricks Nginx into waiting to resolve this until a user actually visits /api/
            set $backend_upstream http://backend:8000;

            # C. Pass the variable, NOT the hardcoded string
            proxy_pass $backend_upstream;

            # Standard headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Rewrite path if your backend expects /api stripped (Optional)
            # rewrite ^/api/(.*) /$1 break; 
        }

        # Angular Routing
        location / {
            try_files $uri $uri/ /index.html;
            expires -1;
        }

        # Static Assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
            expires 1y;
            access_log off;
        }
    }
}
