<div class="container-fluid py-4">
  
  <div class="d-flex justify-content-between align-items-start mb-4">
    
    <div class="d-flex align-items-start gap-3">
      <button class="btn btn-outline-secondary shadow-sm mt-1" routerLink="/dashboard" style="white-space: nowrap;">
        <i class="fas fa-arrow-left me-2"></i>Back
      </button>
      <div>
        <h2 class="mb-1 fw-bold text-dark"><i class="fas fa-chart-line me-2 text-primary"></i>Stock Reports</h2>
        <p class="text-muted mb-0">View and analyze current stock levels across sites</p>
      </div>
    </div>

    <div class="d-flex gap-2 mt-1">
      <button class="btn btn-outline-secondary fw-bold" (click)="toggleViewMode()">
        <i class="fas me-2" [class.fa-th-large]="viewMode === 'table'" [class.fa-list]="viewMode === 'cards'"></i>
        {{ viewMode === 'table' ? 'Switch to Cards' : 'Switch to Table' }}
      </button>
      <button class="btn btn-primary fw-bold" (click)="openExportModal()">
        <i class="fas fa-file-export me-2"></i>Export
      </button>
      <button class="btn btn-success fw-bold" (click)="refreshData()" [disabled]="loading">
        <i class="fas fa-sync-alt me-2" [class.fa-spin]="loading"></i>Refresh
      </button>
    </div>
    
  </div>

  <div class="card shadow-sm border-0 rounded-3 mb-4">
    ```

By placing it inside the `d-flex` container with a `gap-3`, it guarantees the button will sit safely next to your heading, matching the structure of your other pages perfectly.
