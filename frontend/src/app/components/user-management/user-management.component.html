<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-users text-primary me-2"></i> User Management</h2>
    <button class="btn btn-primary shadow-sm" (click)="openAddModal()">
      <i class="fas fa-plus me-2"></i> Add New User
    </button>
  </div>

  <div class="card shadow-sm border-0 rounded-lg">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="bg-light">
            <tr>
              <th class="border-0 px-4 py-3 text-secondary fw-semibold">Username</th>
              <th class="border-0 px-4 py-3 text-secondary fw-semibold">Email</th>
              <th class="border-0 px-4 py-3 text-secondary fw-semibold">Role</th>
              <th class="border-0 px-4 py-3 text-secondary fw-semibold">Status</th>
              <th class="border-0 px-4 py-3 text-secondary fw-semibold text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="isLoading">
              <td colspan="5" class="text-center py-5">
                <div class="spinner-border text-primary spinner-border-sm me-2" role="status"></div>
                <span class="text-muted">Loading user database...</span>
              </td>
            </tr>
            
            <tr *ngFor="let user of paginatedUsers">
              <td class="px-4 py-3 fw-bold text-dark">{{ user.username }}</td>
              <td class="px-4 py-3 text-muted">{{ user.email }}</td>
              <td class="px-4 py-3">
                <span class="badge bg-info text-dark rounded-pill px-3 py-2">{{ user.role }}</span>
              </td>
              <td class="px-4 py-3">
                <span class="badge rounded-pill px-3 py-2" 
                      [ngClass]="user.is_active ? 'bg-success' : 'bg-danger'"
                      style="cursor: pointer;"
                      (click)="toggleUserStatus(user)">
                  {{ user.is_active ? 'Active' : 'Inactive' }}
                </span>
              </td>
              <td class="px-4 py-3 text-end">
                <button *ngIf="canEditUser(user)" (click)="openEditModal(user)" class="btn btn-sm btn-outline-primary me-2 rounded-circle" title="Edit User" style="width: 32px; height: 32px; padding: 0;">
                  <i class="fas fa-edit"></i>
                </button>
                <button *ngIf="canDeleteUser(user)" (click)="deleteUser(user.id)" class="btn btn-sm btn-outline-danger rounded-circle" title="Delete User" style="width: 32px; height: 32px; padding: 0;">
                  <i class="fas fa-trash"></i>
                </button>
              </td>
            </tr>

            <tr *ngIf="!isLoading && paginatedUsers.length === 0">
              <td colspan="5" class="text-center py-5 text-muted">
                <div class="mb-3">
                  <i class="fas fa-user-slash fa-3x text-light"></i>
                </div>
                <h5>No users found</h5>
                <p class="mb-0">There are currently no users registered in the system.</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" [class.show]="showAddModal" [style.display]="showAddModal ? 'block' : 'none'" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-light border-0">
        <h5 class="modal-title fw-bold">
          <i class="fas fa-user-plus text-primary me-2"></i>Create New User
        </h5>
        <button type="button" class="btn-close" (click)="closeAddModal()"></button>
      </div>
      <div class="modal-body p-4">
        <form>
          <div class="mb-3">
            <label class="form-label text-secondary fw-semibold">Username</label>
            <input #newUsername type="text" class="form-control" placeholder="Enter username">
          </div>
          <div class="mb-3">
            <label class="form-label text-secondary fw-semibold">Email Address</label>
            <input #newEmail type="email" class="form-control" placeholder="name@company.com">
          </div>
          <div class="mb-3">
            <label class="form-label text-secondary fw-semibold">Password</label>
            <input #newPassword type="password" class="form-control" placeholder="Create a password">
          </div>
          <div class="mb-4">
            <label class="form-label text-secondary fw-semibold">Role</label>
            <select #newRole class="form-select">
              <option value="user">Standard User</option>
              <option value="owner">Project Owner</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0 bg-light">
        <button type="button" class="btn btn-outline-secondary" (click)="closeAddModal()">Cancel</button>
        <button type="button" class="btn btn-primary px-4" 
                (click)="submitNewUser(newUsername.value, newEmail.value, newRole.value, newPassword.value); newUsername.value=''; newEmail.value=''; newPassword.value=''">
          Save User
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" [class.show]="showEditModal" [style.display]="showEditModal ? 'block' : 'none'" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-light border-0">
        <h5 class="modal-title fw-bold">
          <i class="fas fa-user-edit text-primary me-2"></i>Edit User
        </h5>
        <button type="button" class="btn-close" (click)="closeEditModal()"></button>
      </div>
      <div class="modal-body p-4" *ngIf="editingUser">
        <form>
          <div class="mb-3">
            <label class="form-label text-secondary fw-semibold">Username</label>
            <input #editUsername type="text" class="form-control" [value]="editingUser.username">
          </div>
          <div class="mb-3">
            <label class="form-label text-secondary fw-semibold">Email Address</label>
            <input #editEmail type="email" class="form-control" [value]="editingUser.email">
          </div>
          <div class="mb-4">
            <label class="form-label text-secondary fw-semibold">Role</label>
            <select #editRole class="form-select" [value]="editingUser.role.toLowerCase()">
              <option value="user">Standard User</option>
              <option value="owner">Project Owner</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0 bg-light">
        <button type="button" class="btn btn-outline-secondary" (click)="closeEditModal()">Cancel</button>
        <button type="button" class="btn btn-primary px-4" 
                (click)="submitEditUser(editUsername.value, editEmail.value, editRole.value)">
          Update User
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop fade show" *ngIf="showAddModal || showEditModal"></div>
