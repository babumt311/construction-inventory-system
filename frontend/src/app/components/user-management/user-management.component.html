<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-users text-primary me-2"></i> User Management</h2>
    <button class="btn btn-primary shadow-sm">
      <i class="fas fa-plus me-2"></i> Add New User
    </button>
  </div>

  <div class="card shadow-sm border-0 rounded-lg">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="bg-light">
            <tr>
              <th class="border-0 px-4 py-3 text-secondary fw-semibold">Username</th>
              <th class="border-0 px-4 py-3 text-secondary fw-semibold">Email</th>
              <th class="border-0 px-4 py-3 text-secondary fw-semibold">Role</th>
              <th class="border-0 px-4 py-3 text-secondary fw-semibold">Status</th>
              <th class="border-0 px-4 py-3 text-secondary fw-semibold text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="isLoading">
              <td colspan="5" class="text-center py-5">
                <div class="spinner-border text-primary spinner-border-sm me-2" role="status"></div>
                <span class="text-muted">Loading user database...</span>
              </td>
            </tr>
            
            <tr *ngFor="let user of paginatedUsers">
              <td class="px-4 py-3 fw-bold text-dark">{{ user.username }}</td>
              <td class="px-4 py-3 text-muted">{{ user.email }}</td>
              <td class="px-4 py-3">
                <span class="badge bg-info text-dark rounded-pill px-3 py-2">{{ user.role }}</span>
              </td>
              <td class="px-4 py-3">
                <span class="badge rounded-pill px-3 py-2" 
                      [ngClass]="user.is_active ? 'bg-success' : 'bg-danger'"
                      style="cursor: pointer;"
                      (click)="toggleUserStatus(user)">
                  {{ user.is_active ? 'Active' : 'Inactive' }}
                </span>
              </td>
              <td class="px-4 py-3 text-end">
                <button *ngIf="canEditUser(user)" class="btn btn-sm btn-outline-primary me-2 rounded-circle" title="Edit User" style="width: 32px; height: 32px; padding: 0;">
                  <i class="fas fa-edit"></i>
                </button>
                <button *ngIf="canDeleteUser(user)" (click)="deleteUser(user.id)" class="btn btn-sm btn-outline-danger rounded-circle" title="Delete User" style="width: 32px; height: 32px; padding: 0;">
                  <i class="fas fa-trash"></i>
                </button>
              </td>
            </tr>

            <tr *ngIf="!isLoading && paginatedUsers.length === 0">
              <td colspan="5" class="text-center py-5 text-muted">
                <div class="mb-3">
                  <i class="fas fa-user-slash fa-3x text-light"></i>
                </div>
                <h5>No users found</h5>
                <p class="mb-0">There are currently no users registered in the system.</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
