<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Construction Inventory System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }
    
    .offline-container {
      text-align: center;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    
    .offline-icon {
      font-size: 80px;
      margin-bottom: 20px;
      color: rgba(255, 255, 255, 0.9);
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 15px;
      font-weight: 600;
    }
    
    p {
      font-size: 1.1rem;
      margin-bottom: 25px;
      line-height: 1.6;
      opacity: 0.9;
    }
    
    .actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    
    button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: white;
      color: #667eea;
    }
    
    .btn-primary:hover {
      background: #f8f9fa;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
    
    .connection-status {
      margin-top: 25px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      font-size: 0.9rem;
    }
    
    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }
    
    .status-offline {
      background: #ff9800;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    
    @media (max-width: 576px) {
      .offline-container {
        padding: 25px;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      p {
        font-size: 1rem;
      }
      
      .actions {
        flex-direction: column;
      }
      
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      The Construction Inventory System requires an internet connection.
      Please check your network connection and try again.
    </p>
    
    <div class="connection-status">
      <span class="status-indicator status-offline"></span>
      <span>Network Status: Offline</span>
    </div>
    
    <div class="actions">
      <button class="btn-primary" onclick="window.location.reload()">
        <span>🔄</span> Try Again
      </button>
      <button class="btn-secondary" onclick="checkConnection()">
        <span>🔍</span> Check Connection
      </button>
    </div>
  </div>

  <script>
    function checkConnection() {
      if (navigator.onLine) {
        window.location.reload();
      } else {
        alert('Still offline. Please check your internet connection.');
      }
    }
    
    // Auto-reload when connection is restored
    window.addEventListener('online', function() {
      window.location.reload();
    });
    
    // Update status indicator
    setInterval(function() {
      const statusElement = document.querySelector('.connection-status span:last-child');
      if (navigator.onLine) {
        statusElement.textContent = 'Network Status: Online - Reloading...';
        setTimeout(() => window.location.reload(), 1000);
      }
    }, 3000);
  </script>
</body>
</html>
