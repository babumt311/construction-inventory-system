[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:fastapi]
command=uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
directory=/app
user=appuser
autostart=true
autorestart=true
startretries=3
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
environment=PYTHONPATH="/app"

[program:celery-worker]
command=celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=100 --autoscale=10,3
directory=/app
user=appuser
autostart=true
autorestart=true
startretries=3
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
environment=PYTHONPATH="/app",CELERY_BROKER_URL="redis://redis:6379/0",CELERY_RESULT_BACKEND="redis://redis:6379/0"

[program:celery-beat]
command=celery -A app.tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule --pidfile=/tmp/celerybeat.pid
directory=/app
user=appuser
autostart=true
autorestart=true
startretries=3
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
environment=PYTHONPATH="/app",CELERY_BROKER_URL="redis://redis:6379/0",CELERY_RESULT_BACKEND="redis://redis:6379/0"

[program:celery-flower]
command=celery -A app.tasks.celery_app flower --port=5555 --broker=redis://redis:6379/0
directory=/app
user=appuser
autostart=false
autorestart=true
startretries=3
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
environment=PYTHONPATH="/app"
