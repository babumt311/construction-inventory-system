<!-- Loading Spinner -->
<div *ngIf="isLoading" class="app-loading-overlay">
  <div class="app-loading-content">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <div class="mt-3">
      <h4>Construction Inventory System</h4>
      <p class="text-muted">Loading application...</p>
    </div>
  </div>
</div>

<!-- App Container -->
<div class="app-container" [class.with-layout]="showLayout" *ngIf="!isLoading">
  
  <!-- Layout for authenticated users -->
  <div *ngIf="showLayout" class="layout-wrapper">
    <app-header></app-header>
    
    <div class="main-container">
      <app-sidebar></app-sidebar>
      
      <main class="main-content">
        <div class="container-fluid py-4">
          <router-outlet></router-outlet>
        </div>
      </main>
    </div>
  </div>
  
  <!-- Full-page for login and public pages -->
  <div *ngIf="!showLayout" class="full-page">
    <router-outlet></router-outlet>
  </div>
</div>
