apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: construction-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
          - containerPort: 5432
          env:
          - name: POSTGRES_USER
            value: postgres
          - name: POSTGRES_DB
            value: construction_inventory
          - name: POSTGRES_PASSWORD
            value: Admin123